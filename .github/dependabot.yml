# Automated dependency-update PRs so security advisories get surfaced and fixed
# (reviewed, not auto-merged). Grouped to keep PR noise down.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      backend-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
