# Auto-merge low-risk Dependabot PRs once all required checks pass:
#   - any github-actions bump, and
#   - npm minor/patch updates (the grouped backend/frontend-minor-patch PRs).
# MAJOR npm bumps are NOT auto-merged — they arrive as individual PRs for review.
#
# Requires repo setting: Settings → General → Pull Requests → "Allow auto-merge".
# The job only reads Dependabot metadata and enables auto-merge; it never checks
# out or runs PR code, so pull_request_target is safe here.
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for low-risk updates
        if: >-
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
