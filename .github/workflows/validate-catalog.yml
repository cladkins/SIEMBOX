name: Validate Catalog

# Least-privilege: this workflow only checks out + validates, so read-only.
permissions:
  contents: read

# Gate for community catalog submissions. Parsers under catalog/ must pass strict
# schema validation AND their own self-tests (run through the same
# parse->derive->normalize pipeline the app uses); detection rules under rules/
# must pass strict structural validation against the operators/shape the rules
# engine supports. Anything that passes here imports into SIEMBox cleanly.
on:
  pull_request:
    paths:
      - 'catalog/**'
      - 'rules/**'
      - 'backend/src/services/parser/**'
      - 'backend/src/services/rules/**'
      - 'backend/src/scripts/validate-parsers.ts'
      - 'backend/src/scripts/validate-detections.ts'
      - '.github/workflows/validate-catalog.yml'
  push:
    branches: [main, develop]
    paths:
      - 'catalog/**'
      - 'rules/**'
      - 'backend/src/services/parser/**'
      - 'backend/src/services/rules/**'
      - '.github/workflows/validate-catalog.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate parsers + detections
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Build validators
        working-directory: backend
        run: npm run build

      - name: Validate catalog parsers (strict + self-tests)
        working-directory: backend
        run: npm run validate-parsers -- ../catalog/parsers

      - name: Validate detection rules (strict)
        working-directory: backend
        run: npm run validate-detections -- ../rules

