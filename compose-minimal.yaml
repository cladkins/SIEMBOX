# SIEM BOX - Minimal Docker Compose
# Just the basics: PostgreSQL + Syslog + API + Frontend

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: siembox-minimal-postgres
    environment:
      POSTGRES_DB: siembox
      POSTGRES_USER: siembox
      POSTGRES_PASSWORD: siembox
    volumes:
      - postgres_minimal_data:/var/lib/postgresql/data
      - ./init-minimal-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - siembox-minimal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siembox -d siembox"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Syslog Server
  syslog:
    image: python:3.11-slim
    container_name: siembox-minimal-syslog
    command: >
      sh -c "
        pip install asyncpg &&
        python /app/minimal-syslog-server.py
      "
    volumes:
      - ./minimal-syslog-server.py:/app/minimal-syslog-server.py:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: siembox
      DB_USER: siembox
      DB_PASS: siembox
    ports:
      - "514:514/udp"
    networks:
      - siembox-minimal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # API Server
  api:
    image: python:3.11-slim
    container_name: siembox-minimal-api
    command: >
      sh -c "
        pip install fastapi uvicorn asyncpg &&
        python /app/minimal-api.py
      "
    volumes:
      - ./minimal-api.py:/app/minimal-api.py:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: siembox
      DB_USER: siembox
      DB_PASS: siembox
    ports:
      - "8000:8000"
    networks:
      - siembox-minimal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (nginx serving static HTML)
  frontend:
    image: nginx:alpine
    container_name: siembox-minimal-frontend
    volumes:
      - ./minimal-frontend.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "3000:80"
    networks:
      - siembox-minimal
    restart: unless-stopped

volumes:
  postgres_minimal_data:
    driver: local

networks:
  siembox-minimal:
    driver: bridge
