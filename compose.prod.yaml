# SIEMBox Production Compose File
# Uses pre-built images from GitHub Container Registry (GHCR)
#
# Usage:
#   docker compose -f compose.prod.yaml up -d
#
# To use a specific version:
#   SIEMBOX_VERSION=1.0.0 docker compose -f compose.prod.yaml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: siembox-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-siembox}
      POSTGRES_USER: ${DB_USER:-siembox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-siembox}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siembox-network
    restart: unless-stopped

  # Backend API and Syslog Server
  backend:
    image: ghcr.io/cladkins/siembox-backend:${SIEMBOX_VERSION:-latest}
    container_name: siembox-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8421}
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-siembox}
      DB_USER: ${DB_USER:-siembox}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/data/dbip-country-lite.mmdb}
      GEOIP_HOME_COUNTRIES: ${GEOIP_HOME_COUNTRIES:-}
      # Encrypts stored secrets (scanner creds + the AI API key). Generate with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      # AI builder (optional) — or paste the key in Settings -> AI Builder (encrypted at rest).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Parser/detection catalog source (optional overrides; defaults to cladkins/siembox-parsers).
      SIEMBOX_CATALOG_REPO: ${SIEMBOX_CATALOG_REPO:-}
      SIEMBOX_CATALOG_REF: ${SIEMBOX_CATALOG_REF:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./rules:/app/rules:ro
      - ./data/geoip:/app/data
      - nuclei-templates:/root/nuclei-templates
    # Lets the backend reach services on the Docker host (e.g. a local Ollama at
    # http://host.docker.internal:11434). Ollama must also bind 0.0.0.0.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8421:8421"
      - "514:514/udp"
      - "514:514/tcp"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siembox-network
    restart: unless-stopped

  # Frontend (Vue.js + Nginx)
  frontend:
    image: ghcr.io/cladkins/siembox-frontend:${SIEMBOX_VERSION:-latest}
    container_name: siembox-frontend
    ports:
      - "8420:80"
    depends_on:
      - backend
    networks:
      - siembox-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  nuclei-templates:
    driver: local

networks:
  siembox-network:
    driver: bridge
