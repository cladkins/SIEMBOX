# SIEM BOX - Production Docker Compose Configuration
#
# IMPORTANT: Before deploying to production:
# 1. Create a .env file and set secure passwords
# 2. Generate a secure SECRET_KEY: openssl rand -hex 32
# 3. Update POSTGRES_PASSWORD to a strong password
# 4. Configure notification settings (optional)
# 5. Review and update CORS_ORIGINS for your domain
#
# Quick start:
#   docker compose up -d
# View logs:
#   docker compose logs -f
# Stop all services:
#   docker compose down

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: siembox-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siembox}
      POSTGRES_USER: ${POSTGRES_USER:-siembox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siembox}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - siembox-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siembox -d siembox"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend with Vulnerability Scanning
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siembox-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://siembox:siembox@postgres:5432/siembox}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Optional notification settings
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "8000:8000"
      - "514:514/udp"  # Syslog UDP
    volumes:
      - vulnerability_data:/app/vulnerability_data
      - trivy_cache:/root/.cache/trivy
    networks:
      - siembox-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Enable privileged mode for network scanning capabilities
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siembox-frontend
    command: sh -c 'while ! curl -s -f http://backend:8000/api/v1/health; do echo "Waiting for backend..."; sleep 1; done; nginx -g "daemon off;"'
    ports:
      - "3000:80"
    networks:
      - siembox-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  vulnerability_data:
    driver: local
  trivy_cache:
    driver: local

networks:
  siembox-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
