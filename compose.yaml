# SIEMBox Development Compose File
# Builds containers from source code
#
# For production deployments using pre-built GHCR images, use:
#   docker compose -f compose.prod.yaml up -d
#
# For local development:
#   docker compose up -d --build

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: siembox-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-siembox}
      POSTGRES_USER: ${DB_USER:-siembox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-siembox}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siembox-network
    restart: unless-stopped

  # Backend API and Syslog Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siembox-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8421}
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-siembox}
      DB_USER: ${DB_USER:-siembox}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # EDR YARA rule packs (optional). Built-in starter bundle ships by default;
      # set EDR_YARA_FORGE_ENABLED=true to auto-import YARA-Forge Extended daily.
      EDR_YARA_FORGE_ENABLED: ${EDR_YARA_FORGE_ENABLED:-}
      EDR_YARA_KEEP_VERSIONS: ${EDR_YARA_KEEP_VERSIONS:-}
    volumes:
      - ./rules:/app/rules:ro  # Mount rules directory as read-only
      - ./nuclei-templates:/root/nuclei-templates  # Nuclei vulnerability templates (bind mount for easy customization)
    ports:
      - "8421:8421"
      - "514:514/udp"  # Syslog UDP
      - "514:514/tcp"  # Syslog TCP
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siembox-network
    restart: unless-stopped

  # Frontend (Vue.js + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: siembox-frontend
    ports:
      - "8420:80"
    depends_on:
      - backend
    networks:
      - siembox-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  siembox-network:
    driver: bridge
