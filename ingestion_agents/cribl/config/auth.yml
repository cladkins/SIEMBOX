authType: none
disableAuthToken: false
enableCriblAuth: true
api:
  tokenTimeout: 86400
  maxTokenAge: 604800
  secretKey: "siembox-auth-secret-change-in-production"
users:
  - username: admin
    password: "$2b$10$placeholder.hash.for.admin123"
    roles: ["admin"]
    email: "admin@siembox.local"
    first: "Admin"
    last: "User"
    disabled: false
roles:
  - id: admin
    policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"*","Resource":"*"}]}'
    description: "Full admin access"