id: main
asyncFuncTimeout: 1000
functions:
  - id: serde
    filter: "true"
    disabled: false
    conf:
      mode: extract
      type: csv
      delimChar: ","
      quoteChar: "\""
      escapeChar: "\\"
      nullValue: ""
      srcField: _raw
      cleanFields: false
      fields:
        - message
    description: "Basic serde for structured data"
  
  - id: eval
    filter: "true"
    disabled: false
    conf:
      add:
        - disabled: false
          name: siembox_processed
          value: "true"
        - disabled: false
          name: processing_timestamp
          value: "Date.now()"
        - disabled: false
          name: source_type
          value: "source || 'unknown'"
    description: "Add SIEMBox processing metadata"
  
  - id: drop
    filter: "true"
    disabled: false
    conf:
      fields:
        - "__*"
    description: "Drop internal Cribl fields"

description: "Main processing pipeline for SIEMBox logs"