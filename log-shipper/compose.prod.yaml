# SIEMBox Log Shipper - Production Compose File
# Uses pre-built image from GitHub Container Registry (GHCR)
#
# Usage:
#   docker compose -f compose.prod.yaml up -d
#
# Required environment variables:
#   SHIPPER_API_KEY - Get from SIEMBox UI -> Shippers page
#   SIEMBOX_API_URL - Your SIEMBox server URL (e.g., http://192.168.1.100:3001/api)

services:
  log-shipper:
    image: ghcr.io/cladkins/siembox-log-shipper:${SIEMBOX_VERSION:-latest}
    container_name: siembox-log-shipper
    restart: unless-stopped

    environment:
      # REQUIRED: API key from SIEMBox (get this from SIEMBox UI -> Shippers page)
      SHIPPER_API_KEY: ${SHIPPER_API_KEY}

      # REQUIRED: SIEMBox API URL (change to your SIEMBox server IP/hostname)
      SIEMBOX_API_URL: ${SIEMBOX_API_URL:-http://localhost:3001/api}

      # Optional: Poll interval for configuration updates (seconds)
      CONFIG_POLL_INTERVAL: ${CONFIG_POLL_INTERVAL:-30}

      # Optional: Heartbeat interval (seconds)
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-60}

    # Volume mounts for log files and Docker socket
    # Uncomment and configure based on your log sources
    volumes:
      # For Docker container log monitoring
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # For system logs
      # - /var/log:/var/log:ro

      # For custom application logs
      # - /path/to/your/logs:/logs:ro

      # For persistent cache storage (recommended)
      - shipper-cache:/tmp

    # Use host network for simplest networking setup
    network_mode: host

volumes:
  shipper-cache:
    driver: local
