# SIEMBox Log Shipper — Standalone Deployment
# ============================================
# Run this on ANY host whose logs you want to collect. It is fully
# self-contained: it needs only this file, a .env file, and Docker.
# It talks to your central SIEMBox server over the network and does NOT
# require the rest of the SIEMBox stack to be running locally.
#
# Quick start (on the host you want to collect logs from):
#   mkdir siembox-shipper && cd siembox-shipper
#   curl -O https://raw.githubusercontent.com/cladkins/SIEMBOX/main/log-shipper/compose.prod.yaml
#   curl -o .env https://raw.githubusercontent.com/cladkins/SIEMBOX/main/log-shipper/.env.example
#   nano .env                       # set SHIPPER_API_KEY and SIEMBOX_API_URL
#   nano compose.prod.yaml          # uncomment the volume mounts you need
#   docker compose -f compose.prod.yaml up -d
#
# Get SHIPPER_API_KEY from: SIEMBox UI -> Shippers -> Add Shipper

services:
  log-shipper:
    image: ghcr.io/cladkins/siembox-log-shipper:${SIEMBOX_VERSION:-latest}
    container_name: siembox-log-shipper
    restart: unless-stopped

    # All configuration is read from the .env file in this directory.
    environment:
      # REQUIRED — API key from the SIEMBox UI (Shippers -> Add Shipper).
      # The container fails fast with this message if it is not set.
      SHIPPER_API_KEY: ${SHIPPER_API_KEY:?Set SHIPPER_API_KEY in your .env file}
      # REQUIRED — URL of your central SIEMBox backend API.
      #   e.g. http://192.168.1.100:8421/api
      SIEMBOX_API_URL: ${SIEMBOX_API_URL:?Set SIEMBOX_API_URL in your .env file (e.g. http://your-siembox:8421/api)}
      # Optional tuning
      CONFIG_POLL_INTERVAL: ${CONFIG_POLL_INTERVAL:-30}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-60}

    volumes:
      # --- Pick the log sources you need and uncomment them ---
      #
      # Docker container logs (read other containers' stdout/stderr):
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #
      # systemd journal (sshd, docker, etc.):
      - /var/log/journal:/var/log/journal:ro
      #
      # File-based logs — mount the directories/files your apps write to:
      # - /var/log/nginx:/var/log/nginx:ro
      # - /var/log/auth.log:/var/log/auth.log:ro
      # - /path/to/your/app/logs:/logs:ro
      #
      # Persistent send-cache so queued logs survive restarts (recommended):
      - shipper-cache:/tmp

    # Host networking keeps things simple: the shipper can reach your SIEMBox
    # server and read host log paths without extra port/network configuration.
    network_mode: host

volumes:
  shipper-cache:
    driver: local
