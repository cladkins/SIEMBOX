# SIEMBox Log Shipper — Build-from-source (development) Compose File
# ==================================================================
# Builds the shipper image locally from the Dockerfile in this directory.
#
# Most users should NOT use this file. To deploy the shipper on a host,
# use the standalone, pre-built image instead:
#   docker compose -f compose.prod.yaml up -d
#
# Get SHIPPER_API_KEY from: SIEMBox UI -> Shippers -> Add Shipper

services:
  log-shipper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siembox-log-shipper
    restart: unless-stopped

    environment:
      # REQUIRED — API key from the SIEMBox UI (Shippers -> Add Shipper)
      SHIPPER_API_KEY: ${SHIPPER_API_KEY}
      # REQUIRED — URL of your central SIEMBox backend API
      #   e.g. http://192.168.1.100:8421/api
      SIEMBOX_API_URL: ${SIEMBOX_API_URL:-http://localhost:8421/api}
      # Optional tuning
      CONFIG_POLL_INTERVAL: ${CONFIG_POLL_INTERVAL:-30}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-60}

    volumes:
      # --- Pick the log sources you need and uncomment them ---
      #
      # Docker container logs (read other containers' stdout/stderr):
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      #
      # systemd journal (sshd, docker, etc.):
      # - /var/log/journal:/var/log/journal:ro
      #
      # File-based logs — mount the directories/files your apps write to:
      # - /var/log/nginx:/var/log/nginx:ro
      # - /path/to/your/app/logs:/logs:ro
      #
      # Persistent send-cache so queued logs survive restarts (recommended):
      - shipper-cache:/tmp

    # Host networking keeps things simple: the shipper can reach your SIEMBox
    # server and read host log paths without extra port/network configuration.
    network_mode: host

volumes:
  shipper-cache:
    driver: local
