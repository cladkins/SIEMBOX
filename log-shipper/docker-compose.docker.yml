# Example: Forward Docker container logs to SIEMBox
# Monitors specific containers and forwards their logs

version: '3.8'

services:
  log-shipper:
    build: .
    container_name: siembox-log-shipper-docker
    environment:
      SIEM_HOST: 192.168.1.76
      SIEM_PORT: 514
      SIEM_PROTOCOL: udp
      SHIPPER_HOSTNAME: docker-host

      # Docker container sources
      # Format: DOCKER_N=container_name;tag;facility
      DOCKER_1: nginx;nginx;local3
      DOCKER_2: postgres;database;local3
      DOCKER_3: redis;cache;local3
      DOCKER_4: webapp;application;local1

    volumes:
      # Mount Docker socket to access container logs
      - /var/run/docker.sock:/var/run/docker.sock:ro

    restart: unless-stopped
    network_mode: host
