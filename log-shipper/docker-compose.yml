version: '3.8'

services:
  log-shipper:
    build: .
    container_name: ${CONTAINER_NAME:-siembox-log-shipper}
    restart: unless-stopped

    environment:
      # SIEMBox connection settings (from .env file)
      SIEM_HOST: ${SIEM_HOST}
      SIEM_PORT: ${SIEM_PORT:-514}
      SIEM_PROTOCOL: ${SIEM_PROTOCOL:-udp}
      SHIPPER_HOSTNAME: ${SHIPPER_HOSTNAME:-log-shipper}

      # File-based log sources (from .env file)
      # Format: /path/to/file;tag;facility
      FILE_1: ${FILE_1:-}
      FILE_2: ${FILE_2:-}
      FILE_3: ${FILE_3:-}
      FILE_4: ${FILE_4:-}
      FILE_5: ${FILE_5:-}
      FILE_6: ${FILE_6:-}
      FILE_7: ${FILE_7:-}
      FILE_8: ${FILE_8:-}
      FILE_9: ${FILE_9:-}
      FILE_10: ${FILE_10:-}

      # Docker container log sources (from .env file)
      # Format: container_name;tag;facility
      DOCKER_1: ${DOCKER_1:-}
      DOCKER_2: ${DOCKER_2:-}
      DOCKER_3: ${DOCKER_3:-}
      DOCKER_4: ${DOCKER_4:-}
      DOCKER_5: ${DOCKER_5:-}

      # Systemd journal sources (from .env file)
      # Format: unit_name;tag;facility
      JOURNAL_1: ${JOURNAL_1:-}
      JOURNAL_2: ${JOURNAL_2:-}
      JOURNAL_3: ${JOURNAL_3:-}

    volumes:
      # UNCOMMENT AND CUSTOMIZE THE MOUNTS YOU NEED:

      # For NPM logs:
      # - /etc/komodo/stacks/npm/data/logs:/logs:ro

      # For custom log directories:
      # - /path/to/your/logs:/logs:ro

      # For host system logs:
      # - /var/log:/host-logs:ro

      # For Docker container logs:
      # - /var/run/docker.sock:/var/run/docker.sock:ro

      # For config file (alternative to env vars):
      # - ./config.yml:/config/config.yml:ro

    # Use host network for simplest setup
    network_mode: host
