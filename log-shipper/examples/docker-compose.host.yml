# Example: Forward host system logs to SIEMBox
# Requires running on the host or with proper volume mounts

version: '3.8'

services:
  log-shipper:
    build: .
    container_name: siembox-log-shipper-host
    environment:
      SIEM_HOST: 192.168.1.76
      SIEM_PORT: 514
      SIEM_PROTOCOL: udp
      SHIPPER_HOSTNAME: ${HOSTNAME}

      # System log files
      FILE_1: /host-logs/auth.log;auth;local2
      FILE_2: /host-logs/syslog;syslog;local2
      FILE_3: /host-logs/kern.log;kernel;local2

      # Systemd journal (if available)
      JOURNAL_1: sshd;ssh;local4
      JOURNAL_2: docker;docker;local4

    volumes:
      # Mount host logs (read-only)
      - /var/log:/host-logs:ro

      # Optional: Mount systemd journal for journalctl support
      # - /var/log/journal:/var/log/journal:ro
      # - /run/log/journal:/run/log/journal:ro

    restart: unless-stopped
    network_mode: host

    # Optional: Run with host PID namespace for systemd journal access
    # pid: host
