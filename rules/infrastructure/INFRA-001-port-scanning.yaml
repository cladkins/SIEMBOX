name: Port Scan Detection
description: Detects network port scanning reconnaissance activity. 10 connection attempts to 5+ different destination ports in 5 minutes indicates automated port scanning using tools like nmap, masscan, or zmap. Port scanning is reconnaissance phase before exploitation. NOTE: This rule requires distinct_count aggregation feature which is not yet implemented in the backend.
severity: medium
enabled: true
tags: [port-scan, scanning, reconnaissance, infrastructure, network]

conditions:
  - field: message
    operator: regex
    value: "(connection refused|connection attempt|SYN|port.*closed|no route to host)"

aggregation:
  field: source_ip
  timeframe: 5m
  threshold: 10

alert:
  title: "Port Scan Detected from {source_ip}"
  description: "{count} connection attempts from {source_ip} in 5 minutes. IMPLEMENTATION NOTE: Backend distinct_count feature needed to verify 5+ unique destination ports. Current detection based on connection attempt volume only. Identify scan type (TCP/UDP/SYN), review which ports being scanned, check source IP reputation, block IP to prevent further reconnaissance, verify no services were discovered (successful connections), monitor for escalation to exploitation, and review firewall rules for exposed services."
